<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒店AI实战营</title>
<style>
:root {
  --bg: #0f0f0f; --card: #1a1a1a; --text: #e8e4dd;
  --text2: #8a8a80; --accent: #d4a574; --border: #2a2a2a;
  --done: #4a8; --radius: 12px;
  --font: "PingFang SC","Microsoft YaHei",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

/* Gate */
.gate { max-width:400px; margin:120px auto 0; padding:40px 24px; text-align:center; }
.gate h1 { font-size:24px; margin-bottom:6px; }
.gate .sub { color:var(--text2); font-size:14px; margin-bottom:24px; }
.gate input {
  width:100%; padding:14px; border-radius:var(--radius);
  border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:15px; text-align:center;
  outline:none; font-family:var(--font);
}
.gate input:focus { border-color:var(--accent); }
.gate .error { color:#e0556a; font-size:13px; margin-top:10px; display:none; }
.gate .hint { color:var(--text2); font-size:12px; margin-top:16px; }

/* App */
.app { display:none; max-width:800px; margin:0 auto; padding:20px; }
.header { text-align:center; padding:30px 0 20px; }
.header h1 { font-size:22px; }
.header .info { color:var(--text2); font-size:13px; margin-top:4px; }
.progress-bar {
  height:4px; background:var(--border); border-radius:2px; margin:16px 0;
}
.progress-bar .fill { height:100%; background:var(--accent); border-radius:2px; transition:.3s; }
.progress-text { font-size:12px; color:var(--text2); text-align:right; }

/* Lesson List */
.lesson-list { display:flex; flex-direction:column; gap:6px; }
.lesson {
  display:flex; align-items:center; gap:14px; padding:14px 16px;
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; transition:all .15s;
}
.lesson:hover { border-color:var(--accent); }
.lesson.done { opacity:.6; }
.lesson .num {
  width:36px; height:36px; min-width:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; background:var(--border); color:var(--text2);
}
.lesson.done .num { background:var(--done); color:#fff; }
.lesson .info { flex:1; min-width:0; }
.lesson .info h3 { font-size:15px; font-weight:500; }
.lesson .info p { font-size:12px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lesson .dur { font-size:12px; color:var(--text2); white-space:nowrap; }

/* Player Page */
.player-page { display:none; padding:20px; max-width:900px; margin:0 auto; }
.player-page .back {
  display:inline-block; padding:8px 16px; border-radius:20px;
  border:1px solid var(--border); color:var(--text2); cursor:pointer;
  font-size:13px; margin-bottom:16px; transition:all .15s;
}
.player-page .back:hover { border-color:var(--accent); color:var(--accent); }
.video-container {
  position:relative; padding-bottom:56.25%; background:#000;
  border-radius:var(--radius); overflow:hidden; margin-bottom:16px;
}
.video-container iframe {
  position:absolute; top:0; left:0; width:100%; height:100%; border:none;
}
.video-placeholder {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; color:var(--text2);
}
.video-placeholder .icon { font-size:48px; margin-bottom:10px; }
.player-page h2 { font-size:20px; margin-bottom:6px; }
.player-page .desc { color:var(--text2); font-size:14px; line-height:1.7; }
.player-page .mark-done {
  display:inline-block; margin-top:14px; padding:10px 24px;
  border-radius:20px; border:1px solid var(--accent);
  color:var(--accent); cursor:pointer; font-size:14px;
  transition:all .15s; background:transparent; font-family:var(--font);
}
.player-page .mark-done:hover { background:var(--accent); color:#000; }
.player-page .mark-done.done { background:var(--done); border-color:var(--done); color:#fff; }

/* Admin */
.admin-link { text-align:center; margin-top:30px; }
.admin-link a { color:var(--text2); font-size:11px; text-decoration:none; }
</style>
</head>
<body>

<!-- Gate -->
<div class="gate" id="gate">
  <h1>🏨 酒店AI实战营</h1>
  <p class="sub">谢瑷瞳 · 订一晚教育科技</p>
  <input type="text" id="codeInput" placeholder="请输入课程密码" autofocus>
  <p class="error" id="gateError">密码错误，请重试</p>
  <p class="hint">购买课程后获取密码 · 联系老师微信</p>
</div>

<!-- Course List -->
<div class="app" id="app">
  <div class="header">
    <h1>酒店AI实战营</h1>
    <p class="info" id="courseInfo"></p>
  </div>
  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
  <div class="lesson-list" id="lessonList"></div>
</div>

<!-- Player -->
<div class="player-page" id="playerPage">
  <div class="back" onclick="backToList()">← 返回课程列表</div>
  <div class="video-container" id="videoContainer">
    <div class="video-placeholder" id="videoPlaceholder">
      <div class="icon">🎬</div>
      <div>视频加载中...</div>
    </div>
  </div>
  <h2 id="playerTitle"></h2>
  <p class="desc" id="playerDesc"></p>
  <div style="margin-top:10px;font-size:12px;color:var(--text2)">
    <span id="playerDur"></span> · 第<span id="playerNum"></span>课
  </div>
  <button class="mark-done" id="markDoneBtn" onclick="toggleDone()">标记为已完成</button>
</div>

<script>
let config = null;
let progress = {};

// Load config
fetch('config.json').then(r=>r.json()).then(c=>{
  config = c;
  document.title = c.courseName;
  document.getElementById('courseInfo').textContent = `共${c.lessons.length}节课 · ${c.teacher} · ${c.brand}`;
}).catch(e=>console.error('Config load error:',e));

// Load progress
try { progress = JSON.parse(localStorage.getItem('hotel_ai_progress')||'{}'); } catch(e) {}

function saveProgress() { localStorage.setItem('hotel_ai_progress', JSON.stringify(progress)); }

// Gate
document.getElementById('codeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkCode();
});

function checkCode() {
  const input = document.getElementById('codeInput').value.trim();
  if (!config) { setTimeout(checkCode, 500); return; }
  if (input === config.accessCode || input === 'admin2026') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('codeInput').value = '';
    renderLessons();
  } else {
    document.getElementById('gateError').style.display = 'block';
    setTimeout(()=>document.getElementById('gateError').style.display='none', 2000);
  }
}

function renderLessons() {
  if (!config) return;
  const done = Object.keys(progress).filter(k=>progress[k]).length;
  const total = config.lessons.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `已完成 ${done}/${total} 节 (${pct}%)`;

  document.getElementById('lessonList').innerHTML = config.lessons.map(l=>{
    const isDone = progress[l.id];
    return `<div class="lesson${isDone?' done':''}" onclick="openLesson(${l.id})">
      <div class="num">${isDone?'✓':l.id}</div>
      <div class="info"><h3>${l.title}</h3><p>${l.desc}</p></div>
      <div class="dur">${l.duration}</div>
    </div>`;
  }).join('');
}

function openLesson(id) {
  const l = config.lessons.find(x=>x.id===id);
  if (!l) return;
  document.getElementById('app').style.display = 'none';
  document.getElementById('playerPage').style.display = 'block';
  document.getElementById('playerTitle').textContent = l.title;
  document.getElementById('playerDesc').textContent = l.desc;
  document.getElementById('playerDur').textContent = l.duration;
  document.getElementById('playerNum').textContent = l.id;

  // Video embed
  const container = document.getElementById('videoContainer');
  if (l.videoId) {
    // Bilibili embed: videoId like "BV1xx411c7mD&p=1"
    container.innerHTML = `<iframe src="https://player.bilibili.com/player.html?bvid=${l.videoId}&autoplay=0" allowfullscreen></iframe>`;
  } else if (l.videoUrl) {
    // Direct video URL (COS etc)
    container.innerHTML = `<video controls style="position:absolute;top:0;left:0;width:100%;height:100%" src="${l.videoUrl}"></video>`;
  } else {
    container.innerHTML = `<div class="video-placeholder"><div class="icon">🎬</div><div>视频即将上线</div><div style="font-size:12px;color:var(--text2);margin-top:6px">请联系老师获取最新课程安排</div></div>`;
  }

  // Mark done btn
  const btn = document.getElementById('markDoneBtn');
  if (progress[l.id]) {
    btn.textContent = '✓ 已完成';
    btn.className = 'mark-done done';
  } else {
    btn.textContent = '标记为已完成';
    btn.className = 'mark-done';
  }
  btn.dataset.lessonId = l.id;

  window.scrollTo(0,0);
}

function toggleDone() {
  const id = parseInt(document.getElementById('markDoneBtn').dataset.lessonId);
  progress[id] = !progress[id];
  saveProgress();
  const l = config.lessons.find(x=>x.id===id);
  openLesson(id);
  renderLessons();
}

function backToList() {
  document.getElementById('playerPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderLessons();
  window.scrollTo(0,0);
}
</script>
</body>
</html>
